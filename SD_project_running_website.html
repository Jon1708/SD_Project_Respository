<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F.R.O.G.S. Web App</title>

  <style>
    body {
      margin: 0;
      background-color: #050505;
      color: white;
      font-family: Arial, sans-serif;
    }

    .app {
      padding: 25px;
    }

    h1 {
      text-align: center;
      color: #d4af37;
      letter-spacing: 2px;
    }

    .status-card,
    .sensor-card {
      border: 2px solid #d4af37;
      border-radius: 18px;
      padding: 20px;
      background-color: #121212;
    }

    .status-card {
      margin-bottom: 25px;
    }

    .status-card h2,
    .sensor-card h3 {
      color: #d4af37;
    }

    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }

    .sensor-card {
      text-align: center;
    }

    .icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      color: white;
    }

    .label {
      color: #aaaaaa;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 40px;
    }

    button {
      padding: 14px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .connect-btn {
      background-color: #d4af37;
      color: black;
      border: none;
    }

    .pump-btn {
      background-color: transparent;
      color: #d4af37;
      border: 2px solid #d4af37;
    }

    @media (max-width: 900px) {
      .sensor-grid {
        grid-template-columns: 1fr;
      }

      .button-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>F.R.O.G.S. Water System</h1>

    <div class="status-card">
      <h2>System Status</h2>
      <p id="connectionStatus">❌ Device Disconnected</p>
      <p id="wifiStatus">⚠️ Waiting for ESP32 connection...</p>
    </div>

    <div class="sensor-grid">
      <div class="sensor-card">
        <div class="icon">💧</div>
        <h3>TDS</h3>
        <p class="value" id="tdsValue">-- ppm</p>
        <p class="label">Water Purity</p>
      </div>

      <div class="sensor-card">
        <div class="icon">🌡️</div>
        <h3>Temperature</h3>
        <p class="value" id="tempValue">-- °F</p>
        <p class="label">Water Temperature</p>
      </div>

      <div class="sensor-card">
        <div class="icon">🌊</div>
        <h3>Flow Rate</h3>
        <p class="value" id="flowValue">-- L/min</p>
        <p class="label">Water Flow</p>
      </div>

      <div class="sensor-card">
        <div class="icon">🔋</div>
        <h3>Battery</h3>
        <p class="value" id="batteryValue">--%</p>
        <p class="label">Battery Level</p>
      </div>

      <div class="sensor-card">
        <div class="icon">⚙️</div>
        <h3>Pump</h3>
        <p class="value" id="pumpValue">OFF</p>
        <p class="label">Pump Status</p>
      </div>
    </div>

    <div class="button-row">
      <button class="connect-btn" onclick="getSensorData()">Refresh Data</button>
      <button class="pump-btn">Pump Control</button>
    </div>
  </div>

  <script>
    async function getSensorData() {
      try {
        const response = await fetch("/data");
        const data = await response.json();

        document.getElementById("tdsValue").innerText = data.tds + " ppm";
        document.getElementById("tempValue").innerText = data.temperature + " °F";
        document.getElementById("flowValue").innerText = data.flowRate + " L/min";
        document.getElementById("batteryValue").innerText = data.battery + "%";
        document.getElementById("pumpValue").innerText = data.pump;

        document.getElementById("connectionStatus").innerText = "✅ Device Connected";
        document.getElementById("wifiStatus").innerText = "ESP32 data received successfully.";
      } catch (error) {
        document.getElementById("connectionStatus").innerText = "❌ Device Disconnected";
        document.getElementById("wifiStatus").innerText = "Could not reach ESP32 /data route.";
      }
    }

    setInterval(getSensorData, 3000);
  </script>
</body>
</html>
